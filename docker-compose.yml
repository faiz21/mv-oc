# MV-Companion OS — Full Stack (15 containers)
# All services run on mv_network; only Caddy is internet-facing
# Ref: system-architecture.md

networks:
  mv_network:
    driver: bridge

volumes:
  db_data:          # PostgreSQL data files — all schemas, tables, pgvector indexes
  storage_data:     # Uploaded files — artifacts, wiki assets, profile images
  caddy_data:       # Let's Encrypt SSL certificates (auto-renewed)
  caddy_config:     # Caddy runtime config and admin API state

services:

  # ─── Reverse Proxy (only public-facing) ─────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: mv_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # SSL certs
      - caddy_config:/config   # Runtime config state
    networks:
      - mv_network
    depends_on:
      - app
      - kong
      - studio

  # ─── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mv_app
    restart: unless-stopped
    environment:
      # Browser-side — public URL routed through Caddy
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      # Server-side — internal Docker hostname (never exposed to browser)
      - SUPABASE_URL=http://kong:8000
      - SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
      - NODE_ENV=production
    networks:
      - mv_network
    depends_on:
      - kong
      - openclaw-gateway

  # ─── OpenClaw Gateway ────────────────────────────────────────────────────────
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: mv_openclaw_gateway
    restart: unless-stopped
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - TZ=${OPENCLAW_TZ:-UTC}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      - OPENCLAW_SUPABASE_URL=${OPENCLAW_SUPABASE_URL:-http://host.docker.internal:54321}
      - OPENCLAW_SUPABASE_KEY=${OPENCLAW_SUPABASE_KEY:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./openclaw_config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./openclaw_workspace}:/home/node/.openclaw/workspace
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18889}:${OPENCLAW_GATEWAY_PORT:-18889}"
      - "${OPENCLAW_BRIDGE_PORT:-18890}:${OPENCLAW_BRIDGE_PORT:-18890}"
    init: true
    command: ["node", "dist/index.js", "gateway", "--bind", "${OPENCLAW_GATEWAY_BIND:-lan}", "--port", "${OPENCLAW_GATEWAY_PORT:-18889}"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18889}/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mv_network

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: mv_openclaw_cli
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - BROWSER=echo
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./openclaw_config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./openclaw_workspace}:/home/node/.openclaw/workspace

  # ─── Supabase Stack ──────────────────────────────────────────────────────────

  kong:
    image: kong:2.8.1
    container_name: mv_kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
    volumes:
      - ./supabase/kong.yml:/home/kong/kong.yml:ro
    # No ports exposed — internal only; Caddy proxies api.domain.com → kong:8000
    networks:
      - mv_network
    depends_on:
      - auth
      - rest
      - realtime
      - storage
      - functions
      - meta

  db:
    image: supabase/postgres:15.1.0.117
    container_name: mv_db
    restart: unless-stopped
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mv_network

  auth:
    image: supabase/gotrue:v2.143.0
    container_name: mv_auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_SMTP_HOST: ${GOTRUE_SMTP_HOST}
      GOTRUE_SMTP_PORT: ${GOTRUE_SMTP_PORT}
      GOTRUE_SMTP_USER: ${GOTRUE_SMTP_USER}
      GOTRUE_SMTP_PASS: ${GOTRUE_SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${GOTRUE_SMTP_SENDER_NAME:-MV-Companion OS}
    networks:
      - mv_network
    depends_on:
      db:
        condition: service_healthy

  rest:
    image: postgrest/postgrest:v12.0.1
    container_name: mv_rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    networks:
      - mv_network
    depends_on:
      db:
        condition: service_healthy

  realtime:
    image: supabase/realtime:v2.27.5
    container_name: mv_realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_replication_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaseEncryptedKey
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    networks:
      - mv_network
    depends_on:
      db:
        condition: service_healthy

  storage:
    image: supabase/storage-api:v0.46.4
    container_name: mv_storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - storage_data:/var/lib/storage
    networks:
      - mv_network
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started

  functions:
    image: supabase/edge-runtime:v1.41.2
    container_name: mv_functions
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      VERIFY_JWT: "false"
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
    networks:
      - mv_network
    depends_on:
      db:
        condition: service_healthy

  meta:
    image: supabase/postgres-meta:v0.80.0
    container_name: mv_meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - mv_network
    depends_on:
      - db

  studio:
    image: supabase/studio:20240101-cea346d
    container_name: mv_studio
    restart: unless-stopped
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_REST_URL: http://kong:8000/rest/v1/
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    networks:
      - mv_network
    depends_on:
      - kong

  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: mv_imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    networks:
      - mv_network

  analytics:
    image: supabase/logflare:1.4.0
    container_name: mv_analytics
    restart: unless-stopped
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: _analytics
      DB_HOSTNAME: db
      DB_PORT: 5432
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-your-logflare-api-key}
      LOGFLARE_SINGLE_TENANT: "true"
      LOGFLARE_SUPABASE_MODE: "true"
      LOGFLARE_MIN_CLUSTER_SIZE: 1
      RELEASE_COOKIE: cookie
    networks:
      - mv_network
    depends_on:
      db:
        condition: service_healthy

  vector:
    image: timberio/vector:0.28.1-alpine
    container_name: mv_vector
    restart: unless-stopped
    volumes:
      - ./supabase/vector.yml:/etc/vector/vector.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mv_network
